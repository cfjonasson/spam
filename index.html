<!DOCTYPE html>
<html>
<head>
  <title>Notis Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      background: #1e293b;
      padding: 30px;
      border-radius: 16px;
      text-align: center;
      width: 320px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h1 {
      font-size: 20px;
      margin-bottom: 15px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
    }

    .start {
      background: #22c55e;
      color: black;
    }

    .stop {
      background: #ef4444;
      color: white;
    }

    .stats {
      margin-top: 15px;
      text-align: left;
      font-size: 13px;
      background: #0b1220;
      padding: 10px;
      border-radius: 10px;
    }

    .status {
      margin-top: 10px;
      font-size: 12px;
      opacity: 0.8;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>🔔 Notis Dashboard</h1>

    <button class="start" onclick="startNotifications()">Start</button>
    <button class="stop" onclick="stopNotifications()">Stop</button>

    <div class="stats">
      <div>📨 Notiser: <span id="count">0</span></div>
      <div>⏱️ Tid: <span id="time">0</span> sek</div>
      <div>⚡ Rate: <span id="rate">0</span> /sek</div>
    </div>

    <div class="status" id="status">Status: idle</div>
  </div>

  <script>
    let interval = null;
    let count = 0;
    let startTime = null;
    let timer = null;

    async function startNotifications() {
      const perm = await Notification.requestPermission();
      if (perm !== "granted") {
        alert("Tillåt notiser först!");
        return;
      }

      if (interval) return;

      count = 0;
      startTime = Date.now();

      document.getElementById("status").innerText = "Status: running";

      // Notis loop
      interval = setInterval(() => {
        count++;
        new Notification("de la checkt #" + count);
        document.getElementById("count").innerText = count;
      }, 2000);

      // Statistik updatering
      timer = setInterval(() => {
        let seconds = Math.floor((Date.now() - startTime) / 1000);
        let rate = (count / (seconds || 1)).toFixed(2);

        document.getElementById("time").innerText = seconds;
        document.getElementById("rate").innerText = rate;
      }, 500);
    }

    function stopNotifications() {
      clearInterval(interval);
      clearInterval(timer);

      interval = null;
      timer = null;

      document.getElementById("status").innerText = "Status: stopped";
    }
  </script>
</body>
</html>
