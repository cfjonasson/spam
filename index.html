<!DOCTYPE html>
<html>
<head>
  <title>Notis Dashboard Pro</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      background: #1e293b;
      padding: 25px;
      border-radius: 18px;
      width: 360px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      text-align: center;
    }

    button {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
    }

    .start { background: #22c55e; color: black; }
    .stop { background: #ef4444; color: white; }

    .stats {
      margin-top: 15px;
      text-align: left;
      background: #0b1220;
      padding: 10px;
      border-radius: 10px;
      font-size: 13px;
    }

    canvas {
      width: 100%;
      height: 120px;
      background: #0b1220;
      border-radius: 10px;
      margin-top: 15px;
    }

    .status {
      margin-top: 10px;
      font-size: 12px;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>🔔 Notis Dashboard Pro</h2>

    <button class="start" onclick="startNotifications()">Start</button>
    <button class="stop" onclick="stopNotifications()">Stop</button>

    <div class="stats">
      <div>📨 Notiser: <span id="count">0</span></div>
      <div>⏱️ Tid: <span id="time">0</span> sek</div>
      <div>⚡ Rate: <span id="rate">0</span> /sek</div>
    </div>

    <canvas id="graph" width="320" height="120"></canvas>

    <div class="status" id="status">Status: idle</div>
  </div>

<script>
let notifyInterval = null;
let statsInterval = null;
let count = 0;
let startTime = 0;
let history = [];

const canvas = document.getElementById("graph");
const ctx = canvas.getContext("2d");

async function startNotifications() {
  const perm = await Notification.requestPermission();
  if (perm !== "granted") {
    alert("Tillåt notiser först");
    return;
  }

  if (notifyInterval) return;

  count = 0;
  history = [];
  startTime = Date.now();
  document.getElementById("status").innerText = "Status: running";

  // Snabbare notiser
  notifyInterval = setInterval(() => {
    count++;
    new Notification("🔔 Notis #" + count);
    document.getElementById("count").innerText = count;
  }, 500);

  statsInterval = setInterval(() => {
    const seconds = Math.floor((Date.now() - startTime) / 1000);
    const rate = (count / (seconds || 1)).toFixed(2);

    document.getElementById("time").innerText = seconds;
    document.getElementById("rate").innerText = rate;

    history.push(count);
    if (history.length > 30) history.shift();

    drawGraph();
  }, 1000);
}

function stopNotifications() {
  clearInterval(notifyInterval);
  clearInterval(statsInterval);
  notifyInterval = null;
  statsInterval = null;
  document.getElementById("status").innerText = "Status: stopped";
}

function drawGraph() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (history.length < 2) return;

  const max = Math.max(...history);

  ctx.strokeStyle = "#22c55e";
  ctx.lineWidth = 2;
  ctx.beginPath();

  history.forEach((value, i) => {
    const x = (i / (history.length - 1)) * canvas.width;
    const y = canvas.height - (value / max) * canvas.height;

    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });

  ctx.stroke();
}
</script>
</body>
</html>
